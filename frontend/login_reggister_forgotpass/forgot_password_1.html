<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - NoteNoty</title>
    <link rel="stylesheet" href="forgot_pw_1_UI.css">
</head>
<body>
    <video autoplay muted loop playsinline class="bg-video">
        <source src="anh/background_animation.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="forgot_pw">
        <div class="o_forgot_pw">
            <h2>Khôi phục mật khẩu</h2>
            <form id="forgotForm">
                <div class="box">
                    <input type="text" id="forgotEmail" placeholder="Nhập email tài khoản" required>
                    <img src="anh/icon_email.png" alt="Icon">
                </div>
                <div class="auth-message" id="forgotMessage"></div>
                <div>
                    <button type="submit" class="button_send_mail">Gửi liên kết khôi phục</button>
                </div> 
                <div class="back_login">
                    <p>Nhớ mật khẩu? <a href="login.html">Đăng nhập</a></p>
                </div>
            </form>  
        </div>
    </div>
    <script src="../assets/js/api_client.js"></script>
    <script src="auth_flow.js"></script>
</body>
</html>
