<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="../manifest.webmanifest">
    <meta name="theme-color" content="#7d72cc">
    <title>Tạo mật khẩu mới - NoteNoty</title>
    <link rel="stylesheet" href="forgot_pw_1_UI.css">
</head>
<body>
    <video autoplay muted loop playsinline class="bg-video">
        <source src="anh/background_animation.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="forgot_pw">
        <div class="o_forgot_pw">
            <h2>Tạo mật khẩu mới</h2>
            <form id="resetPasswordForm">
                <div class="box">
                    <input type="password" id="resetPassword" placeholder="Mật khẩu mới" minlength="6" autocomplete="new-password" required>
                    <img src="anh/icon_password.png" alt="Icon">
                </div>
                <div class="box">
                    <input type="password" id="resetPasswordConfirm" placeholder="Xác nhận mật khẩu" minlength="6" autocomplete="new-password" required>
                    <img src="anh/icon_password.png" alt="Icon">
                </div>
                <div class="auth-message" id="resetPasswordMessage"></div>
                <div>
                    <button type="submit" class="button_send_mail" id="resetPasswordBtn">Cập nhật mật khẩu</button>
                </div>
                <div class="back_login">
                    <p>Đã đổi xong? <a href="login.html">Đăng nhập</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/api_client.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token") || "";
        const email = params.get("email") || "";
        const mode = params.get("mode") === "change" ? "change" : "reset";
        const form = document.getElementById("resetPasswordForm");
        const message = document.getElementById("resetPasswordMessage");
        const button = document.getElementById("resetPasswordBtn");

        function showMessage(text, type = "") {
            message.textContent = text;
            message.className = `auth-message ${type}`.trim();
        }

        form.addEventListener("submit", async event => {
            event.preventDefault();
            showMessage("");

            const password = document.getElementById("resetPassword").value;
            const confirmation = document.getElementById("resetPasswordConfirm").value;

            if (!token) {
                showMessage("Liên kết không hợp lệ hoặc thiếu mã xác nhận.", "error");
                return;
            }

            if (mode === "reset" && !email) {
                showMessage("Liên kết khôi phục thiếu email tài khoản.", "error");
                return;
            }

            if (password.length < 6) {
                showMessage("Mật khẩu cần có ít nhất 6 ký tự.", "error");
                return;
            }

            if (password !== confirmation) {
                showMessage("Xác nhận mật khẩu chưa khớp.", "error");
                return;
            }

            try {
                button.disabled = true;
                button.textContent = "Đang cập nhật...";

                const data = mode === "change"
                    ? await window.NoteNotyApi.completePasswordChange({ token, password, password_confirmation: confirmation })
                    : await window.NoteNotyApi.resetPassword({ email, token, password, password_confirmation: confirmation });

                showMessage(data.message || "Mật khẩu đã được cập nhật.", "success");
                form.reset();
            } catch (error) {
                showMessage(error.message, "error");
            } finally {
                button.disabled = false;
                button.textContent = "Cập nhật mật khẩu";
            }
        });
    </script>
    <script src="../assets/js/runtime_config.js"></script>
    <script src="../assets/js/pwa.js"></script>
</body>
</html>
